services:
  # ─────────────────────────────────────────────
  # V1Claw Agent (one-shot query)
  #   docker compose run --rm v1claw-agent -m "Hello"
  # ─────────────────────────────────────────────
  v1claw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v1claw-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/home/v1claw/.v1claw/config.json:ro
      - v1claw-workspace:/home/v1claw/.v1claw/workspace
    entrypoint: ["v1claw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # V1Claw Gateway (Long-running Bot)
  #   docker compose up v1claw-gateway
  # ─────────────────────────────────────────────
  v1claw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v1claw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/home/v1claw/.v1claw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - v1claw-workspace:/home/v1claw/.v1claw/workspace
    command: ["gateway"]

volumes:
  v1claw-workspace:
