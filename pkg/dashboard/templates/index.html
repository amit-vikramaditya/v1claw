<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 1.5rem 2rem; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 1rem; }
        .header h1 { font-size: 1.5rem; color: #00d4ff; }
        .header .badge { background: #00c853; color: #000; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background: #12121f; border: 1px solid #2a2a4a; border-radius: 0.75rem; padding: 1.25rem; }
        .card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
        .card .value { font-size: 2rem; font-weight: 700; color: #00d4ff; margin-top: 0.25rem; }
        .card .sub { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
        .channels { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .channels .ch { background: #1a1a2e; border: 1px solid #333; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
        .footer { text-align: center; padding: 2rem; color: #444; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 {{.Title}}</h1>
        <span class="badge">{{.Status.Status}}</span>
    </div>
    <div id="status-area" hx-get="/status" hx-trigger="every 5s" hx-swap="innerHTML">
        {{template "status_fragment.html" .Status}}
    </div>
    <div class="footer">V1Claw — Your 24/7 AI Assistant</div>
</body>
</html>
